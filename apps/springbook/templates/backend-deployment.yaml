{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ include "springbook.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.backend.name }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.backend.name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.initWaitForMysql }}
      initContainers:
        - name: init-mydb
          image: {{ .Values.backend.initImage }}
          command:
            - sh
            - -c
            - "until nslookup {{ .Values.mysql.service.name }}.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mydb; sleep 2; done"
      {{- end }}
      containers:
        - name: {{ .Values.backend.name }}
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          workingDir: {{ .Values.backend.workDir | default "/app" }}
          command: ["/opt/bilarn/startup.sh"]
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-creds
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-creds
                  key: password
          ports:
            - containerPort: {{ .Values.backend.port }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.livenessProbe.httpGet.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.readinessProbe.httpGet.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.readinessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ .Values.backend.readinessProbe.timeoutSeconds }}
            periodSeconds: {{ .Values.backend.readinessProbe.periodSeconds }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: backend-config
              mountPath: {{ .Values.backend.configMountPath }}
              subPath: application.properties
            - name: app-config-writable
              mountPath: {{ .Values.backend.workDir | default "/app" }}
            - name: vault-secrets-placeholder
              mountPath: /vault/secrets
              readOnly: true
      volumes:
        - name: backend-config
          configMap:
            name: {{ .Values.backend.configMapName }}
            items:
              - key: application.properties
                path: application.properties
        - name: app-config-writable
          emptyDir: {}
        - name: vault-secrets-placeholder
          configMap:
            name: {{ .Values.backend.vaultSecretsConfigMapName | default "backend-vault-placeholder" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.service.name }}
  namespace: {{ include "springbook.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Values.backend.name }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      {{- if and (eq .Values.backend.service.type "NodePort") .Values.backend.service.nodePort }}
      nodePort: {{ .Values.backend.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: {{ .Values.backend.name }}
{{- end }}
