apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontendapp
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: frontendapp
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontendapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontendapp
    spec:
      containers:
        - name: frontendapp
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            limits: {{ toYaml .Values.frontend.resources.limits | nindent 12 }}
            requests: {{ toYaml .Values.frontend.resources.requests | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: frontendapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: {{ .Values.frontend.service.nodePort }}