# Springbook Helm values – STAGING
# Overrides for apps/springbook chart

namespace: springbook-staging

backend:
  enabled: true                        # ✅ needed for ConfigMap
  configMapName: backend-config 
  replicas: 2
  image:
    repository: springbook-backend
    tag: "latest"
  service:
    nodePort: 32100
  resources:
    limits:
      cpu: 400m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi

frontend:
  replicas: 2
  image:
    repository: springbook-frontend
    tag: "latest"
  service:
    nodePort: 32101
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Staging: update schema, do not drop data
backendConfig:
  logging:                             # ✅ required by ConfigMap
    level_org_springframework: INFO
    level_com_mkyong: INFO
    level_com_zaxxer: WARN
    level_root: INFO
  management:
    endpointsExposure: health,info
    healthProbesEnabled: true
  datasource:
    hikariConnectionTimeout: 30000
    hikariMaximumPoolSize: 10
  jpa:
    hibernateDdlAuto: update

mysql:
  resources: {}
