# Springbook Helm values – DEV
# Overrides for apps/springbook chart

namespace: springbook-dev

backend:
  enabled: true                        # ✅ needed for ConfigMap
  configMapName: backend-config        # ✅ must match your backend.configmap.yaml
  replicas: 1
  image:
    repository: springbook-backend     # ✅ your backend image
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    nodePort: 32000
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi

frontend:
  replicas: 1
  image:
    repository: springbook-frontend    # ✅ fix typo ("fontend" → "frontend")
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    nodePort: 32001
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

backendConfig:
  logging:                             # ✅ required by ConfigMap
    level_org_springframework: INFO
    level_com_mkyong: INFO
    level_com_zaxxer: WARN
    level_root: INFO
  management:
    endpointsExposure: health,info
    healthProbesEnabled: true
  datasource:
    hikariConnectionTimeout: 30000
    hikariMaximumPoolSize: 10
  jpa:
    hibernateDdlAuto: update

mysql:
  resources: {}
