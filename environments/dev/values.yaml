# Springbook Helm values – DEV
# Overrides for apps/springbook chart

namespace: springbook-dev

# -- Backend
backend:
  enabled: true                        # must be true for backend deployment
  configMapName: backend-config        # must match backend ConfigMap
  replicas: 1
  image:
    repository: springbook-backend
    tag: "dev"
    pullPolicy: IfNotPresent
  service:
    nodePort: 32000
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
  # Remove startup.sh references
  workDir: "/app"
  vaultSecretsConfigMapName: "backend-vault-placeholder"
  initWaitForMysql: true
  initImage: busybox:1.28
  livenessProbe:
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 45
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 5

# -- Backend environment variables for Spring Boot
backendEnv:
  SPRING_DATASOURCE_URL: "jdbc:mysql://{{ .Values.mysql.service.name }}:{{ .Values.mysql.port }}/{{ .Values.mysql.auth.database }}"
  SPRING_DATASOURCE_USERNAME: "{{ .Values.mysql.auth.username }}"
  SPRING_DATASOURCE_PASSWORD: "{{ .Values.mysql.auth.password }}"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "{{ .Values.backendConfig.jpa.hibernateDdlAuto }}"

# -- Backend ConfigMap values
backendConfig:
  logging:
    level_org_springframework: INFO
    level_com_mkyong: INFO
    level_com_zaxxer: WARN
    level_root: INFO
  management:
    endpointsExposure: health,info
    healthProbesEnabled: true
  datasource:
    hikariConnectionTimeout: 30000
    hikariMaximumPoolSize: 10
  jpa:
    hibernateDdlAuto: update

# -- Frontend
frontend:
  replicas: 1
  image:
    repository: springbook-frontend
    tag: "dev"
    pullPolicy: IfNotPresent
  service:
    nodePort: 32001
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi

# -- MySQL (DEV)
mysql:
  auth:
    username: bilarn
    password: password
    rootPassword: password
    database: bookdb
  resources: {}
  service:
    name: mysql-svc
    port: 3306